<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>js obf</title>
</head>
<body>
    <input type="text" id="textInput">
    <button id="obfuscateButton">Obfuscate</button>
    <pre id="output"></pre>
    <script>
        function obfuscateCode(code) {
            // Simple obfuscation: reverse the code and convert to base64
            const reversedCode = code.split('').reverse().join('');
            return btoa(reversedCode);
        }

        document.getElementById('obfuscateButton').addEventListener('click', () => {
            const inputCode = document.getElementById('textInput').value;
            const obfuscatedCode = obfuscateCode(inputCode);
            document.getElementById('output').textContent = obfuscatedCode;
        });
    </script>
</body>
</html>
